# render.yaml — Configuración para despliegue en Render.com
# Documentación: https://render.com/docs/blueprint-spec
# NOTA: MongoDB no está disponible como servicio nativo en Render.
# Usa MongoDB Atlas (gratuito): https://cloud.mongodb.com

services:
  # ── Backend API ──────────────────────────────
  - type: web
    name: fluenta-api
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # Configurar manualmente en dashboard con tu URI de Atlas
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://fluenta.vercel.app
      # Variables opcionales (configurar manualmente en dashboard):
      # - SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASS
      # - VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_EMAIL
      # - GOOGLE_TTS_API_KEY, GOOGLE_STT_API_KEY

